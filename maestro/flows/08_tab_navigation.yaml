appId: ${APP_ID}
tags:
  - navigation

---
- runFlow: 01_login_success.yaml
- waitForAnimationToEnd

# Navigate each main tab by coordinate (avoids Vietnamese encoding issues on Windows)
# Tab order: Tổng quan(10%), Hồ sơ(30%), Vụ việc(50%), Đơn thư(70%), Thông báo(90%)
- tapOn:
    point: "50%,96%"
- waitForAnimationToEnd
- takeScreenshot: 08_tab_cases

- tapOn:
    point: "70%,96%"
- waitForAnimationToEnd
- takeScreenshot: 08_tab_petitions

- tapOn:
    point: "90%,96%"
- waitForAnimationToEnd
- takeScreenshot: 08_tab_notifications

# Each tab switch should not crash or show error
- assertNotVisible: "Exception"
- assertNotVisible: "RenderFlex overflowed"
