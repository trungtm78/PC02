appId: ${APP_ID}
tags:
  - auth
  - error-handling

---
# Verifies login_screen.dart fix: error message must be Vietnamese,
# NOT raw e.toString() / DioException / stack trace

- launchApp
- waitForAnimationToEnd

- tapOn: "Email"
- inputText: "wrong@example.com"
- tapOn: "Mật khẩu"
- inputText: "wrongpassword123"
- hideKeyboard
- tapOn: "ĐĂNG NHẬP"
- waitForAnimationToEnd

- takeScreenshot: 02_login_wrong_password

# Must show Vietnamese user-friendly message
- assertVisible: "Email hoặc mật khẩu không đúng"

# Must NOT expose raw technical errors to user
- assertNotVisible: "DioException"
- assertNotVisible: "DioError"
- assertNotVisible: "SocketException"
- assertNotVisible: "Exception:"
- assertNotVisible: "toString()"
- assertNotVisible: "statusCode"
- assertNotVisible: "FormatException"
