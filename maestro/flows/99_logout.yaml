appId: ${APP_ID}
tags:
  - smoke
  - auth

---
# Assumes app is on dashboard (run after other tests)
- launchApp
- waitForAnimationToEnd

# Open drawer
- tapOn:
    point: "5%,5%"
- waitForAnimationToEnd
- takeScreenshot: 99_menu_open

# Tap "Đăng xuất" by coordinate (bottom of drawer, ~20% x, ~68% y)
- tapOn:
    point: "20%,68%"
- waitForAnimationToEnd
- takeScreenshot: 99_logged_out

# Login screen should be visible again (tap confirms Email field exists)
- tapOn:
    point: "50%,40%"
    optional: true
- assertNotVisible: "Exception"
