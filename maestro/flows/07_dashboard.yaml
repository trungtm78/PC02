appId: ${APP_ID}
tags:
  - smoke
  - dashboard

---
# Assumes app is on dashboard (run after 01_login_success)
- launchApp
# Wait for auth check + 4 API calls to complete before asserting
- waitForAnimationToEnd:
    timeout: 8000
- assertVisible:
    text: "Tổng quan"
- waitForAnimationToEnd
- takeScreenshot: 07_dashboard

# Must not show raw error text
- assertNotVisible: "null"
- assertNotVisible: "Exception"
- assertNotVisible: "Lỗi tải dữ liệu"
# Dashboard must show stats section
- assertVisible: "Tổng hồ sơ"
