appId: ${APP_ID}
tags:
  - smoke

---
# Ensure we start from login screen by logging out if already logged in
- launchApp:
    clearState: true
- waitForAnimationToEnd

# clearState ensures fresh start — no need to logout
- tapOn:
    point: "5%,5%"
    optional: true
- waitForAnimationToEnd

# Tap logout if drawer opened — shorthand matches accessibilityText too
- tapOn:
    text: "Đăng xuất"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: 00_initial_state
