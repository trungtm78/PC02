# SEC (CSO finding): rate-limit zone declared at http scope, scoped to client IP.
# Set this in /etc/nginx/nginx.conf http block if running outside the docker template.
# limit_req_zone $binary_remote_addr zone=pc02_api:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SEC: cap request body to 25MB (matches backend MAX_FILE_SIZE=10MB + form overhead).
    # Prevents multi-GB upload buffering attacks.
    client_max_body_size 25M;

    # SEC: security headers (defense-in-depth — backend also sends helmet headers).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HSTS — only meaningful after TLS termination; comment back in once cert deployed.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Reverse proxy: API requests → NestJS backend
    location /api/ {
        # SEC: rate-limit API; 10 r/s steady, burst 20. Requires `limit_req_zone` in http {}.
        # limit_req zone=pc02_api burst=20 nodelay;

        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        proxy_connect_timeout 10s;
    }

    # React SPA: all other routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}
