# Sprint 3 / S3.3 — Prometheus config cho PC02.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: 'pc02-backend'
    metrics_path: /api/v1/metrics
    static_configs:
      - targets: ['host.docker.internal:3000']
        labels:
          service: 'pc02-backend'
          env: 'production'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
