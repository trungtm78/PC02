# ─────────────────────────────────────────────────────────────────────────────
# PC02 — Production nginx config (golden template)
#
# Sprint 1 / S1.1 — Public Internet ready: TLS + security headers + CSP +
# rate-limit + request-size cap. Cài lên system nginx tại
# /etc/nginx/sites-available/pc02 → symlink sang /etc/nginx/sites-enabled/.
#
# Workflow:
#   1. Trỏ A record của domain về 171.244.40.245.
#   2. `sudo certbot --nginx -d <domain> --redirect` để cấp Let's Encrypt cert
#      và force HTTPS redirect tự động.
#   3. Chạy `scripts/deploy/install-nginx-config.sh <domain>` để copy file này
#      vào /etc/nginx/sites-available/pc02 với <domain> điền đúng.
#   4. `sudo nginx -t && sudo systemctl reload nginx`.
#
# Test sau khi cài:
#   - https://<domain>/api/v1/health → 200 + HSTS preload + nosniff + CSP
#   - http://<domain>/ → 301 redirect
#   - https://securityheaders.com/?q=<domain> → A+ rating
#   - https://www.ssllabs.com/ssltest/ → A grade
# ─────────────────────────────────────────────────────────────────────────────

# Rate-limit zone — declare ở http {} scope. File này dùng include vào /etc/nginx/conf.d/
# hoặc copy phần limit_req_zone sang /etc/nginx/nginx.conf trong http {} block.
limit_req_zone $binary_remote_addr zone=pc02_api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=pc02_login:10m rate=3r/s;

# HTTP → HTTPS redirect server
server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    # Let's Encrypt ACME HTTP-01 challenge (giữ port 80 mở cho cert renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # Mọi request khác → 301 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name __DOMAIN__;

    # TLS cert — certbot tự fill khi chạy `certbot --nginx`. Đây là path mặc định.
    ssl_certificate     /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;

    # SSL hardening (Mozilla intermediate profile 2025)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    root /var/www/pc02;
    index index.html;

    # SEC — request-size cap (backend giới hạn 10MB upload + form overhead).
    # Multi-GB upload bị reject 413 ngay tại nginx, không buffer to disk.
    client_max_body_size 25M;

    # Security headers — defense-in-depth bên cạnh helmet (backend).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    # CSP — frontend serve HTML thật → set explicit policy.
    # NOTE: 'unsafe-inline' cho style cần thiết vì Tailwind + Vite inject inline styles.
    # Em sẽ tighten ở Sprint 3 (nonce-based) sau khi verify build output không break.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # Reverse proxy: /api/ → NestJS backend
    location /api/ {
        # SEC — rate-limit 10 r/s steady, burst 20. Backend cũng có throttler
        # nhưng nginx đầu giảm tải khi attack.
        limit_req zone=pc02_api burst=20 nodelay;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        proxy_connect_timeout 10s;
    }

    # SEC — Stricter rate-limit cho login endpoint (3 r/s).
    location = /api/v1/auth/login {
        limit_req zone=pc02_login burst=5 nodelay;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # React SPA: tất cả route khác → index.html (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressive nhưng index.html luôn fresh
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            # Re-emit security headers (add_header không inherit qua nested location)
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
        }
    }

    # Static assets — long cache (Vite emits hashed filenames)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
