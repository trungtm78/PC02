appId: vn.gov.pc02.mobile
name: "02 — Login with 2FA TOTP code"
tags:
  - auth
  - 2fa
env:
  TEST_EMAIL: e2e+twofa@test.pc02.local
  TEST_PASSWORD: Test1234!Aa
---
# Seed a user with 2FA enabled. Backend returns the current TOTP code so
# Maestro can submit it without needing to compute TOTP client-side.
- evalScript: |
    const apiBase = MAESTRO_API_BASE_URL || 'http://10.0.2.2:3000/api/v1';
    const token = MAESTRO_TEST_SEED_TOKEN;
    if (!token) { throw new Error('MAESTRO_TEST_SEED_TOKEN env not set'); }
    const r = http.post(apiBase + '/test/seed-user', {
      headers: {
        'x-test-seed-token': token,
        'content-type': 'application/json',
      },
      body: JSON.stringify({
        email: TEST_EMAIL,
        password: TEST_PASSWORD,
        mustChangePassword: false,
        twoFaEnabled: true,
      }),
    });
    if (r.status !== 200) {
      throw new Error('seed failed: ' + r.status + ' ' + r.body);
    }
    const data = json(r.body);
    if (!data.currentTotpCode || data.currentTotpCode.length !== 6) {
      throw new Error('seed response missing currentTotpCode');
    }
    output.otp = data.currentTotpCode;

- launchApp:
    appId: vn.gov.pc02.mobile
    clearState: true
    clearKeychain: true

# Phase A: Submit credentials → backend should return pending: true + twoFaToken.
- tapOn:
    id: "login-email-field"
- inputText: ${TEST_EMAIL}
- hideKeyboard
- tapOn:
    id: "login-password-field"
- inputText: ${TEST_PASSWORD}
- hideKeyboard
- tapOn:
    id: "login-submit-button"

# Phase B: 2FA screen should be visible. Auto-submit on 6th digit, but we
# also tap the submit button for determinism (avoids onChanged race).
- assertVisible:
    id: "2fa-otp-field"
    timeout: 10000
- tapOn:
    id: "2fa-otp-field"
- inputText: ${output.otp}
- hideKeyboard
- tapOn:
    id: "2fa-submit-button"

# Phase C: After OTP verify, we should reach the dashboard.
- assertVisible:
    id: "dashboard-scaffold"
    timeout: 15000
